# LoRA fine-tune of surt-small-v3 on Apple Silicon (M-series, MPS).
# Tuned for an M4 Pro with 48 GB unified memory. Trades a bit of throughput
# for memory headroom so the box stays usable while training.
#
# Usage:
#   python scripts/finetune_path_b.py --config configs/training/surt_lora_mac.yaml \
#     --manifest training_data/kirtan_v1/manifest.json \
#     --output-dir lora_adapters/surt_mac_v1
#
# Any CLI flag overrides the corresponding YAML key. --manifest and
# --output-dir have no defaults here; supply them on the command line.

# -- Base model selection -----------------------------------------------------

model_id: surindersinghssj/surt-small-v3
model_type: whisper              # explicit; skips auto-detection
language: punjabi                # Whisper generation language tag

# -- LoRA --------------------------------------------------------------------
# r=16 / alpha=32 is the standard PEFT default for Whisper-small; ~3M trainable
# params (~1% of 240M base). q_proj/k_proj/v_proj/out_proj are Whisper's
# attention projections — where most kirtan-domain adaptation lives.

lora_r: 16
lora_alpha: 32
lora_dropout: 0.1
lora_target_modules: "q_proj,k_proj,v_proj,out_proj"

# -- Training loop -----------------------------------------------------------
# batch=4 + grad_accum=2 => effective batch 8.
# M4 Pro 48 GB easily fits this; bigger batches don't speed up much because
# MPS isn't dramatically tensor-bound at this scale.

batch_size: 4
grad_accum: 2
epochs: 3
lr: 1.0e-5                       # Whisper fine-tunes prefer lower LR than CTC
warmup_steps: 100
save_steps: 500
max_steps: 0                     # 0 means "use epochs"; set >0 for smoke tests

# -- Precision ---------------------------------------------------------------
# bf16 is CUDA-only. fp16 on MPS would give ~30% throughput lift, BUT it
# requires torch >= 2.8 (for accelerate's MPS GradScaler check) — and our
# current pinned torch 2.5 ecosystem doesn't support that. Until torch is
# upgraded (which requires revisiting torchaudio/torchcodec/ctranslate2),
# fp16 is forced off on MPS and we run fp32. This costs ~30% throughput.
#
# To re-enable fp16 on MPS:
#   1. Bump torch to 2.8+ (verify torchcodec/torchaudio/ctranslate2 compat).
#   2. Bump accelerate to >= 1.11.0 in requirements.txt.
#   3. Restore fp16: null below to get the auto-detect behavior back.

bf16: null                        # auto: True on CUDA, False on MPS/CPU
fp16: false                       # forced off — see comment above for upgrade path

# -- Reproducibility ---------------------------------------------------------
# seed feeds torch/numpy/random + HF Trainer's dataloader generator. On MPS,
# many ops aren't bit-deterministic so two same-seed runs match approximately
# (~2% val loss tolerance), not exactly. On CPU expect ~0.5%. We do NOT call
# torch.use_deterministic_algorithms(True) — too many MPS ops would fail.
#
# Shell setup (the .claude/settings.json env block sets these automatically):
#   export PYTORCH_ENABLE_MPS_FALLBACK=1
#   export HF_HUB_ENABLE_HF_TRANSFER=1

seed: 42

# -- Regularization ----------------------------------------------------------
# weight_decay=0.01 follows the Whisper FT literature for PEFT/LoRA.
# max_grad_norm=1.0 matches the HF Trainer default; declared here for visibility.

weight_decay: 0.01
max_grad_norm: 1.0

# -- LR schedule -------------------------------------------------------------
# cosine annealing is the standard for Whisper-family fine-tunes — flat HF
# default is "linear". warmup_ratio (if > 0) supersedes warmup_steps; it
# scales naturally with dataset size, unlike a fixed step count.

lr_scheduler_type: cosine
warmup_ratio: 0.1                 # 10% of total steps; 0 disables (falls back to warmup_steps)

# -- Memory ------------------------------------------------------------------
# gradient_checkpointing trades ~20% throughput for ~30% memory headroom on
# the activations, useful when scaling batch size or sequence length. Kept
# OFF for v0 — PEFT + GC has historical quirks (requires_grad propagation on
# the adapter graph) and Phase 0 doesn't change runtime behavior. Phase 3
# flips this on after isolated verification.

gradient_checkpointing: false

# -- Evaluation + early stopping --------------------------------------------
# Kept at "no" until Phase 1 produces a val manifest via --split-by shabad.
# Phase 3's config will set eval_strategy=steps, eval_steps=250,
# early_stopping_patience=2, load_best_model_at_end=true once a real
# manifest_val.json exists at training_data/<run>/manifest_val.json.
#
# Constraint: if load_best_model_at_end is true, save_steps must be a
# multiple of eval_steps (HF Trainer enforces this; the script also pre-validates).

eval_strategy: "no"               # "no" | "steps"  (epoch unused here)
eval_steps: 250
early_stopping_patience: 0        # 0 disables; auto-active when > 0 and an eval manifest is provided
load_best_model_at_end: false

# -- Experiment tracking -----------------------------------------------------
# report_to=auto resolves at runtime: wandb if WANDB_API_KEY is set (and
# WANDB_MODE != disabled), else tensorboard, else none. Smoke target passes
# --report-to none to keep validation cheap and air-gapped.

report_to: auto                   # auto | wandb | tensorboard | none | comma-list
wandb_project: kirtan-asr
run_name: null                    # null -> auto: <config_hash[:8]>-<timestamp>
